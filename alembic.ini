[alembic]
script_location = alembic
prepend_sys_path = .

# Overridden in alembic/env.py from DATABASE_URL env var.
# This value is only used if DATABASE_URL is not set.
sqlalchemy.url = postgresql+asyncpg://skiware:skiware@localhost:5432/skiware

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
