services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: skiware
      POSTGRES_PASSWORD: skiware
      POSTGRES_DB: skiware
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U skiware"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    command: ["uvicorn", "backend.main:app", "--host", "0.0.0.0", "--port", "8080", "--reload"]
    ports:
      - "8080:8080"
    environment:
      - PORT=8080
      - DATABASE_URL=postgresql+asyncpg://skiware:skiware@db:5432/skiware
      - GOOGLE_PLACES_API_KEY=${GOOGLE_PLACES_API_KEY}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - GCP_PROJECT=${GCP_PROJECT}
      - GCP_REGION=${GCP_REGION:-us-central1}
      - GOOGLE_APPLICATION_CREDENTIALS=/root/.config/gcloud/application_default_credentials.json
    volumes:
      - ./backend:/app/backend
      - ./alembic:/app/alembic
      - ./alembic.ini:/app/alembic.ini
      - ./uploads:/app/uploads
      - ~/.config/gcloud:/root/.config/gcloud:ro
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
    depends_on:
      - app
    environment:
      - VITE_API_PROXY_TARGET=http://app:8080
      - CHOKIDAR_USEPOLLING=true
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/frontend
      - frontend_node_modules:/frontend/node_modules

volumes:
  frontend_node_modules:
  postgres_data:
